version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: traffic-classifier-backend
    ports:
      - "8080:8080"
    environment:
      - RUST_LOG=info
      - CAPTURE_MODE=simulation
      - CAPTURE_PPS=10000
      - SERVER_PORT=8080
      - ML_SERVER_URL=http://ml-server:50051
      - USE_ML=false
    volumes:
      - ./config.toml:/app/config.toml:ro
    networks:
      - traffic-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  ml-server:
    build:
      context: .
      dockerfile: classifier/Dockerfile
    container_name: traffic-classifier-ml
    ports:
      - "50051:50051"
    networks:
      - traffic-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:50051/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  mlx-server:
    build:
      context: .
      dockerfile: classifier/Dockerfile.mlx
    container_name: traffic-classifier-mlx
    platform: linux/arm64
    ports:
      - "50052:50052"
    networks:
      - traffic-net
    restart: unless-stopped
    profiles:
      - mlx

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: traffic-classifier-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - traffic-net
    restart: unless-stopped

networks:
  traffic-net:
    driver: bridge
